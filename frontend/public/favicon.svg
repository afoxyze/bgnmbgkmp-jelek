<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: light for visibility in most browser tabs -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>

  <!-- Top accent bar (matches OG) -->
  <rect x="6" y="6" width="52" height="4" rx="2" fill="#C41E3A"/>

  <!-- Oversized red quotation marks: the visual signature of "Bagus" in the brand -->
  <g fill="#C41E3A" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="13" y="54" font-size="52" textLength="15">&#8220;</text>
    <text x="39" y="54" font-size="52" textLength="15">&#8221;</text>
  </g>
</svg>
